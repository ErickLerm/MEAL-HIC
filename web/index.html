<!DOCTYPE html>
<html>
<head>
  <meta property="og:title" content="MEAL-HIC">
  <meta property="og:description" content="Registro diario de alimentación y control nutricional para pacientes pediátricos">
  <meta property="og:url" content="https://bitacora-nutricional.web.app/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://bitacora-nutricional.web.app/icons/icono-512.png">
  
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="theme-color" content="#000000">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Registro diario de alimentación y control nutricional para pacientes pediátricos">
  <link rel="apple-touch-icon" href="icons/icono-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icono-16.png"/>

  <title>Bitácora Nutricional</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
<script src="flutter_bootstrap.js" async></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then((reg) => {
          console.log('Service Worker registrado correctamente');

          // Forzar búsqueda de actualizaciones cada vez que se carga la página
          reg.update();

          reg.onupdatefound = () => {
            const newWorker = reg.installing;
            if (newWorker) {
              newWorker.onstatechange = () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('Nueva versión disponible. Recargando aplicación...');
                  window.location.reload();
                }
              };
            }
          };
        })
        .catch((error) => {
          console.error('Error al registrar Service Worker:', error);
        });
    });
  }
</script>

</body>
</html>
